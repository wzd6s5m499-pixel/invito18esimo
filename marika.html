<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invito 18 Marika</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            font-family: 'Montserrat', sans-serif; 
            background-color: #062419; 
            color: #f5f5dc;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Contenitore con Sfondo Tropicale Elegante Generato in CSS (Niente link rotti) */
        .wrapper {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            position: relative;
            box-sizing: border-box;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            overflow: hidden;
            /* Sfumatura lussuosa verde e oro */
            background: radial-gradient(circle at 50% 30%, #0d4731 0%, #052115 70%);
        }

        /* Foglie esotiche geometriche ed eleganti agli angoli (create via codice) */
        .wrapper::before, .wrapper::after {
            content: "";
            position: absolute;
            width: 200px;
            height: 200px;
            opacity: 0.15;
            background-image: radial-gradient(circle, #daa520 1px, transparent 1px);
            background-size: 15px 15px;
            pointer-events: none;
        }
        .wrapper::before { top: -20px; left: -20px; border-radius: 50%; border: 2px dashed #daa520; }
        .wrapper::after { bottom: -20px; right: -20px; border-radius: 50%; border: 2px dashed #daa520; }

        /* Contenuto Principale spostato verso l'alto per armonia */
        .main-content {
            width: 100%;
            margin-top: 10px;
        }

        /* Dettaglio grafico tropicale elegante */
        .tropical-badge {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #b8860b;
            margin-bottom: 5px;
            font-weight: 600;
        }

        /* Scritta 'eighteen' in oro elegante */
        .eighteen { 
            font-family: 'Pinyon Script', cursive;
            font-size: 55px;
            line-height: 1;
            margin: 0 auto;
            background: linear-gradient(135deg, #ffeaa7, #daa520, #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle { 
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 25px 0 10px 0;
            color: rgba(245, 245, 220, 0.7);
            font-weight: 400;
        }
        
        /* Nome 'Marika' - Corsivo ad altissima eleganza */
        .nome { 
            font-family: 'Pinyon Script', cursive;
            font-size: 85px;
            line-height: 0.9;
            margin: 0 0 35px 0;
            background: linear-gradient(135deg, #ffffff 30%, #f3ce7a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* Blocco Data sottile e lussuoso */
        .details-row { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 90%;
            margin: 0 auto;
            border-top: 1px solid rgba(218, 165, 32, 0.3);
            border-bottom: 1px solid rgba(218, 165, 32, 0.3);
            padding: 12px 0;
        }
        
        .details-row span { 
            font-size: 15px;
            letter-spacing: 2px;
            font-weight: 400;
            color: #f5f5dc;
        }
        
        .big-date { 
            font-size: 42px;
            color: #daa520;
            font-weight: 300;
            font-family: 'Montserrat', sans-serif;
        }

        /* Blocco Dress Code e Tema armonioso */
        .info-block {
            margin-top: 40px;
        }

        .info-text {
            font-size: 13px;
            letter-spacing: 1.5px;
            color: rgba(245, 245, 220, 0.9);
            margin: 8px 0;
            font-weight: 300;
        }
        
        .info-text strong {
            color: #daa520;
            font-weight: 400;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
        }

        /* Pulsanti d'oro minimali ed eleganti */
        .btn-box { 
            display: flex;
            gap: 15px;
            width: 100%;
            margin-top: auto;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 16px 10px;
            border-radius: 4px; /* Taglio squadrato più moderno ed elegante */
            background: transparent;
            border: 1px solid #daa520;
            color: #daa520;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 2px;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 0 0 rgba(218, 165, 32, 0.2);
        }
        
        .btn:active {
            background-color: rgba(218, 165, 32, 0.1);
            transform: scale(0.98);
        }

        .btn span { 
            display: block;
            font-weight: 300;
            font-size: 9px;
            opacity: 0.7;
            text-transform: lowercase;
            margin-top: 3px;
            letter-spacing: 1px;
            color: #f5f5dc;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="main-content">
            <div class="tropical-badge">✦ tropical party ✦</div>
            
            <div class="eighteen">eighteen</div>

            <p class="subtitle">Sei invitata al mio compleanno</p>
            
            <h1 class="nome">Marika</h1>

            <div class="details-row">
                <span>LUGLIO</span>
                <span class="big-date">8</span>
                <span>ORE 20:30</span>
            </div>

            <div class="info-block">
                <p class="info-text"><strong>Dress Code:</strong> No Nero No Bianco</p>
                <p class="info-text"><strong>Tema:</strong> Tropical Elegant</p>
            </div>
        </div>

        <div class="btn-box">
            <a href="https://wa.me/393668101927?text=Ciao%20Marika!%20Confermo%20con%20piacere%20la%20mia%20presenza%20per%20il%20tuo%2018esimo!" class="btn">
                Conferma
                <span>tramite whatsapp</span>
            </a>
            <a href="https://maps.app.goo.gl/hwWsaFW3maXfQHjH9?g_st=ic" target="_blank" class="btn">
                Posizione
                <span>apri google maps</span>
            </a>
        </div>
    </div>

</body>
</html>
