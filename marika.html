<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marika's Birthday - Tropical Party</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Montserrat', sans-serif; 
            background: #00b4d8; /* Azzurro base */
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        
        /* Sfondo Hawaiano - Sfumatura Cielo, Sole e Mare */
        .wrapper {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centra tutto senza spazi vuoti enormi */
            align-items: center;
            text-align: center;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
            background: linear-gradient(180deg, #ff99c8 0%, #fcf6bd 35%, #d0f4de 65%, #a9def9 100%);
        }

        /* Decorazioni Tropicali Colorate (CSS purissimo) */
        .flower { position: absolute; font-size: 40px; opacity: 0.8; z-index: 0; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1)); }
        .f1 { top: 5%; left: 5%; color: #ff0a54; transform: rotate(-15deg); } /* Rosa Ibisco */
        .f2 { top: 15%; right: 8%; color: #ff70a6; transform: rotate(20deg); }
        .f3 { bottom: 10%; left: 10%; color: #ff9770; transform: rotate(-25deg); } /* Arancio */
        .f4 { bottom: 20%; right: 5%; color: #70d6ff; transform: rotate(10deg); } /* Azzurro */
        .leaf { position: absolute; font-size: 60px; color: #2d6a4f; opacity: 0.2; z-index: 0; }
        .l1 { top: 30%; left: -10px; }
        .l2 { bottom: 30%; right: -10px; }

        .content { position: relative; z-index: 2; width: 100%; }

        .badge {
            font-size: 12px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #d00000; /* Rosso ibisco */
            margin-bottom: 10px;
            font-weight: 700;
        }

        .eighteen { 
            font-family: 'Pinyon Script', cursive;
            font-size: 65px;
            color: #fb8500; /* Arancio Giallo */
            margin: 0;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.8);
        }

        .subtitle { 
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 15px 0;
            color: #333;
            font-weight: 400;
        }
        
        /* Marika's Birthday - Scritta Elegante e Colorata */
        .nome-container { margin-bottom: 30px; }
        .nome { 
            font-family: 'Pinyon Script', cursive;
            font-size: 65px;
            line-height: 1;
            margin: 0;
            background: linear-gradient(to right, #ff0054, #ff5400);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 2px rgba(255,255,255,1));
        }
        .birthday-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #0077b6;
            margin-top: -5px;
            display: block;
        }

        /* Dettagli armoniosi */
        .details { 
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 15px;
            width: 85%;
            margin: 0 auto;
            border: 2px solid white;
        }
        
        .date-row { display: flex; align-items: center; justify-content: center; gap: 15px; }
        .date-row span { font-size: 18px; font-weight: 700; color: #d00000; }
        .big-number { font-size: 45px; color: #fb8500; }

        .info { margin-top: 20px; font-size: 14px; color: #333; }
        .info p { margin: 5px 0; }
        .info b { color: #ff0054; text-transform: uppercase; }

        /* Bottoni più alti e colorati */
        .btn-box { 
            display: flex; flex-direction: column; 
            gap: 12px; width: 85%; 
            margin-top: 30px; /* Portati più in alto */
        }

        .btn {
            padding: 15px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            border: 2px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .btn-confirm { background: #ff0054; color: white; } /* Rosa */
        .btn-map { background: #00b4d8; color: white; } /* Azzurro */
        
        .btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <div class="wrapper">
        <div class="flower f1">🌺</div>
        <div class="flower f2">🌸</div>
        <div class="flower f3">🌼</div>
        <div class="flower f4">🏝️</div>
        <div class="leaf l1">🌿</div>
        <div class="leaf l2">🍃</div>

        <div class="content">
            <div class="badge">Tropical Party</div>
            <div class="eighteen">Eighteen</div>

            <p class="subtitle">Sei invitata al</p>
            
            <div class="nome-container">
                <h1 class="nome">Marika's</h1>
                <span class="birthday-text">Birthday</span>
            </div>

            <div class="details">
                <div class="date-row">
                    <span>LUGLIO</span>
                    <span class="big-number">8</span>
                    <span>ORE 20:30</span>
                </div>
                <div class="info">
                    <p><b>Dress Code:</b> No Nero No Bianco</p>
                    <p><b>Tema:</b> Hawaiian Chic</p>
                </div>
            </div>

            <center>
            <div class="btn-box">
                <a href="https://wa.me/393668101927?text=Ciao%20Marika!%20Confermo%20con%20piacere%20la%20mia%20presenza!" class="btn btn-confirm">
                    Conferma Presenza
                </a>
                <a href="https://maps.app.goo.gl/hwWsaFW3maXfQHjH9?g_st=ic" target="_blank" class="btn btn-map">
                    Posizione Locale
                </a>
            </div>
            </center>
        </div>
    </div>

</body>
</html>
