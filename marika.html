<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marika's 18th Birthday</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Arial', sans-serif;
            background-color: #03120c;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* Il sito carica l'immagine perfetta e super colorata che hai scelto */
        .wrapper {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            background-image: url('https://images2.imgbox.com/39/10/eN7G9Sfe_o.png');
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }

        /* Contenitore dei pulsanti perfettamente posizionati e ravvicinati come da foto */
        .btn-container {
            position: absolute;
            bottom: 8%;
            left: 5%;
            right: 5%;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .btn {
            flex: 1;
            padding: 15px 5px;
            border-radius: 10px;
            background: rgba(10, 25, 18, 0.4);
            border: 1px solid #e5b842;
            color: #e5b842;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 2px;
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }

        .btn span {
            display: block;
            font-size: 8px;
            font-weight: 300;
            text-transform: lowercase;
            opacity: 0.8;
            margin-top: 3px;
            color: #f4eae1;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="btn-container">
            <a href="https://wa.me/393668101927?text=Ciao%20Marika!%20Confermo%20con%20enorme%20piacere%20la%20mia%20presenza%20per%20il%20tuo%2018esimo!" class="btn">
                CLICCA QUI
                <span>per confermare</span>
            </a>
            <a href="https://maps.app.goo.gl/9uT2N6Zf8q6hM9pA9" target="_blank" class="btn">
                CLICCA QUI
                <span>per la posizione</span>
            </a>
        </div>
    </div>

</body>
</html>
