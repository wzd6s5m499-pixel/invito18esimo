<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invito 18 Marika</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Montserrat', sans-serif; background: #000; color: white; overflow: hidden; }
        
        .wrapper {
            height: 100vh;
            background-color: #002211;
            background-image: 
                radial-gradient(circle at top, rgba(255, 200, 100, 0.3) 0%, transparent 50%),
                radial-gradient(circle at bottom, rgba(0, 150, 100, 0.4) 0%, transparent 60%),
                url('https://www.transparenttextures.com/patterns/stardust.png'),
                url('https://i.ibb.co/L5rK5L0/tropical-leaves-top-left.png'),
                url('https://i.ibb.co/D8G3sM7/tropical-leaves-bottom-right.png');
            background-repeat: no-repeat, no-repeat, repeat, no-repeat, no-repeat;
            background-position: top center, bottom center, center, top left, bottom right;
            background-size: cover, cover, auto, 40%, 40%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 10px 20px;
            box-sizing: border-box;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: -80px; 
            width: 100%;
            max-width: 400px;
        }

        .numero-eighteen { 
            font-family: 'Great Vibes', cursive;
            font-size: 55px;
            font-weight: normal;
            margin-bottom: 5px;
            background: linear-gradient(#f0e68c, #daa520, #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(218, 165, 32, 0.6));
        }

        .subtitle { 
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
            color: #f5f5dc;
            font-weight: 600;
        }
        
        .nome { 
            font-family: 'Great Vibes', cursive;
            font-size: 75px;
            margin: 5px 0 25px 0;
            color: #fff;
            text-shadow: 0 0 10px #ff7f50, 0 0 20px #ff7f50, 0 0 30px #00fa9a;
        }

        .details-row { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            margin: 0;
            border-top: 1px solid rgba(218, 165, 32, 0.5);
            border-bottom: 1px solid rgba(218, 165, 32, 0.5);
            padding: 15px 0;
        }
        
        .details-row span { 
            font-size: 18px;
            font-weight: 600;
            color: #f5f5dc;
        }
        
        .big-date { 
            font-size: 55px;
            color: #ffbf00;
            font-weight: 600;
            text-shadow: 0 0 20px #ffbf00;
        }

        .info-block {
            margin-top: 25px;
            width: 100%;
        }

        .info-text {
            font-size: 14px;
            letter-spacing: 1px;
            color: #f5f5dc;
            margin: 5px 0;
            font-weight: normal;
        }

        .btn-box { 
            display: flex;
            gap: 15px;
            margin-top: 35px;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 18px 5px;
            border-radius: 40px;
            background: linear-gradient(rgba(218, 165, 32, 0.3), rgba(184, 134, 11, 0.3));
            border: 2px solid #daa520;
            color: white;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(8px);
            transition: 0.3s;
            filter: drop-shadow(0 0 5px rgba(255, 127, 80, 0.5));
        }
        .btn:active { transform: scale(0.95); }
        .btn span { 
            font-weight: normal;
            font-size: 9px;
            opacity: 0.9;
            text-transform: uppercase;
            margin-top: 4px;
            color: #f5f5dc;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="main-content">
            <div class="numero-eighteen">eighteen</div>
            <p class="subtitle">Sei invitata al mio compleanno</p>
            <h1 class="nome">Marika</h1>

            <div class="details-row">
                <span>LUGLIO</span>
                <span class="big-date">8</span>
                <span>ORE 20:30</span>
            </div>

            <div class="info-block">
                <p class="info-text">Dress Code: No Nero No Bianco.</p>
                <p class="info-text">Tema: Tropical.</p>
            </div>

            <div class="btn-box">
                <a href="https://wa.me/393668101927?text=Ciao%20Marika!%20Confermo%20con%20piacere%20la%20mia%20presenza%20per%20il%20tuo%2018esimo!" class="btn">
                    CLICCA QUI
                    <span>per confermare</span>
                </a>
                <a href="https://maps.app.goo.gl/hwWsaFW3maXfQHjH9?g_st=ic" target="_blank" class="btn">
                    CLICCA QUI
                    <span>per la posizione</span>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
